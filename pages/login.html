<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴适游四川 - 登录注册</title>
    <!-- 统一CDN资源 和个人中心保持一致 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <style>
        /* 全局改为蓝白色调，功能代码完全不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            /* 蓝白渐变，移除紫色 */
            background: linear-gradient(135deg, #e6f4ff 0%, #ffffff 50%, #f0f8ff 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* 磨砂玻璃通用类 */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 220, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(80, 150, 220, 0.12);
        }
        .glass-input {
            background: rgba(255,255,255,0.85) !important;
            border: 1px solid #b8d8f8 !important;
            color: #222 !important;
        }
        .glass-input:focus {
            background: #fff !important;
            box-shadow: 0 0 0 3px rgba(74, 160, 255, 0.25) !important;
            border-color: #4a90ff !important;
        }
        .glass-input::placeholder {
            color: #6688aa;
        }
        /* 主按钮改为浅蓝色 */
        .glass-btn-primary {
            background: linear-gradient(135deg, #4a90ff 0%, #3684e8 100%);
            border: none;
            transition: all 0.3s ease;
        }
        .glass-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(74, 144, 255, 0.35);
        }
        .tab-btn {
            border: none;
            background: transparent;
            color: #333;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: rgba(74, 144, 255, 0.15);
            color: #3684e8;
            font-weight: bold;
        }
        .tab-btn:hover:not(.active) {
            background: rgba(74, 144, 255, 0.08);
        }
        .switch-text {
            cursor: pointer;
            color: #3684e8;
            font-weight: 500;
        }
        .switch-text:hover {
            text-decoration: underline;
        }
        .fade-tab {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-tip {
            color: #dc3545;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loginApp" class="w-100" style="max-width: 460px;">
        <div class="glass-card p-5" data-aos="zoom-in" data-aos-duration="700">
            <!-- 头部LOGO -->
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none">
                    <h2 class="fw-bold text-dark">
                        <i class="fa-solid fa-mountain-city text-primary me-2"></i>巴适游四川
                    </h2>
                </a>
                <p class="text-secondary mt-2">登录账号，畅游川蜀美景</p>
            </div>

            <!-- 登录/注册切换标签 -->
            <div class="d-flex gap-2 mb-4 justify-content-center">
                <button class="tab-btn active" @click="currentTab='login'">
                    <i class="fa-solid fa-right-to-bracket me-1"></i>账号登录
                </button>
                <button class="tab-btn" @click="currentTab='register'">
                    <i class="fa-solid fa-user-plus me-1"></i>新用户注册
                </button>
            </div>

            <!-- 登录表单 -->
            <div v-if="currentTab === 'login'" class="fade-tab">
                <form @submit.prevent="handleLogin">
                    <div class="mb-3">
                        <label class="form-label fw-medium">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0">
                                <i class="fa-solid fa-user text-primary"></i>
                            </span>
                            <input v-model="loginForm.username" type="text" class="form-control glass-input border-start-0" placeholder="请输入账号">
                        </div>
                        <div class="error-tip mt-1" :style="{display:loginErr.user?'block':'none'}">
                            <i class="fa-solid fa-circle-exclamation me-1"></i>{{loginErr.user}}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium">密码</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0">
                                <i class="fa-solid fa-lock text-primary"></i>
                            </span>
                            <input v-model="loginForm.pwd" :type="pwdVisible?'text':'password'" class="form-control glass-input border-start-0" placeholder="请输入密码">
                            <button type="button" class="input-group-text glass-input border-start-0" @click="pwdVisible=!pwdVisible">
                                <i :class="pwdVisible?'fa-solid fa-eye-slash':'fa-solid fa-eye'" class="text-primary"></i>
                            </button>
                        </div>
                        <div class="error-tip mt-1" :style="{display:loginErr.pwd?'block':'none'}">
                            <i class="fa-solid fa-circle-exclamation me-1"></i>{{loginErr.pwd}}
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input v-model="rememberUser" class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label small" for="remember">记住账号</label>
                        </div>
                        <span class="small switch-text" @click="currentTab='register'">没有账号？去注册</span>
                    </div>

                    <button type="submit" class="btn glass-btn-primary w-100 py-2 fw-bold text-white rounded-pill">
                        <i class="fa-solid fa-unlock me-1"></i>立即登录
                    </button>

                    <div class="text-center mt-3">
                        <button type="button" class="btn btn-outline-primary w-100 py-2 rounded-pill" @click="touristLogin">
                            <i class="fa-solid fa-person-walking me-1"></i>游客快速体验
                        </button>
                    </div>
                </form>
            </div>

            <!-- 注册表单 -->
            <div v-else class="fade-tab">
                <form @submit.prevent="handleRegister">
                    <div class="mb-3">
                        <label class="form-label fw-medium">设置用户名</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0">
                                <i class="fa-solid fa-id-card text-primary"></i>
                            </span>
                            <input v-model="regForm.username" type="text" class="form-control glass-input border-start-0" placeholder="4-12位字母/数字">
                        </div>
                        <div class="error-tip mt-1" :style="{display:regErr.user?'block':'none'}">
                            <i class="fa-solid fa-circle-exclamation me-1"></i>{{regErr.user}}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium">设置密码</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0">
                                <i class="fa-solid fa-key text-primary"></i>
                            </span>
                            <input v-model="regForm.pwd" :type="regPwdShow?'text':'password'" class="form-control glass-input border-start-0" placeholder="至少6位密码">
                            <button type="button" class="input-group-text glass-input border-start-0" @click="regPwdShow=!regPwdShow">
                                <i :class="regPwdShow?'fa-solid fa-eye-slash':'fa-solid fa-eye'" class="text-primary"></i>
                            </button>
                        </div>
                        <div class="error-tip mt-1" :style="{display:regErr.pwd?'block':'none'}">
                            <i class="fa-solid fa-circle-exclamation me-1"></i>{{regErr.pwd}}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0">
                                <i class="fa-solid fa-keyboard text-primary"></i>
                            </span>
                            <input v-model="regForm.rePwd" type="password" class="form-control glass-input border-start-0" placeholder="再次输入密码">
                        </div>
                        <div class="error-tip mt-1" :style="{display:regErr.rePwd?'block':'none'}">
                            <i class="fa-solid fa-circle-exclamation me-1"></i>{{regErr.rePwd}}
                        </div>
                    </div>

                    <button type="submit" class="btn glass-btn-primary w-100 py-2 fw-bold text-white rounded-pill">
                        <i class="fa-solid fa-user-plus me-1"></i>完成注册
                    </button>

                    <p class="text-center small mt-3 mb-0">已有账号？
                        <span class="switch-text" @click="currentTab='login'">返回登录</span>
                    </p>
                </form>
            </div>

            <!-- 返回首页底部 -->
            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                <a href="index.html" class="text-primary text-decoration-none small">
                    <i class="fa-solid fa-arrow-left me-1"></i>返回网站首页
                </a>
            </div>
        </div>
        <p class="text-center text-secondary mt-4 small opacity-75">© 2026 巴适游四川 Web期末作品</p>
    </div>

    <!-- JS资源 和个人中心统一 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',()=>{
            AOS.init({duration:600,once:true});
            const {createApp} = Vue;
            createApp({
                data(){
                    return {
                        // 切换标签
                        currentTab: 'login',
                        // 密码显隐
                        pwdVisible: false,
                        regPwdShow: false,
                        // 记住账号
                        rememberUser: false,
                        // 登录表单
                        loginForm:{
                            username:'',
                            pwd:''
                        },
                        // 注册表单
                        regForm:{
                            username:'',
                            pwd:'',
                            rePwd:''
                        },
                        // 错误提示
                        loginErr:{user:'',pwd:''},
                        regErr:{user:'',pwd:'',rePwd:''}
                    }
                },
                mounted(){
                    // 读取本地记住的账号
                    let saveName = localStorage.getItem('save_username');
                    if(saveName){
                        this.loginForm.username = saveName;
                        this.rememberUser = true;
                    }
                },
                methods:{
                    // 登录逻辑（和user.html数据互通）
                    handleLogin(){
                        // 清空错误
                        this.loginErr = {user:'',pwd:''};
                        let flag = true;
                        // 校验
                        if(!this.loginForm.username.trim()){
                            this.loginErr.user = '请输入用户名';
                            flag = false;
                        }
                        if(!this.loginForm.pwd.trim()){
                            this.loginErr.pwd = '请输入密码';
                            flag = false;
                        }
                        if(!flag) return;

                        // 获取全部用户列表
                        let userList = JSON.parse(localStorage.getItem('web_users')) || [];
                        let targetUser = userList.find(u=>u.username === this.loginForm.username);
                        if(!targetUser){
                            this.loginErr.user = '该账号不存在，请先注册';
                            return;
                        }
                        if(targetUser.pwd !== this.loginForm.pwd){
                            this.loginErr.pwd = '密码输入错误';
                            return;
                        }

                        // 登录成功
                        localStorage.setItem('currentUser',JSON.stringify(targetUser));
                        // 记住账号处理
                        if(this.rememberUser){
                            localStorage.setItem('save_username',this.loginForm.username);
                        }else{
                            localStorage.removeItem('save_username');
                        }
                        window.location.href = 'index.html';
                    },
                    // 游客快捷登录
                    touristLogin(){
                        let userList = JSON.parse(localStorage.getItem('web_users')) || [];
                        let tourist = userList.find(u=>u.username === 'tourist');
                        if(!tourist){
                            tourist = {
                                username:'tourist',
                                pwd:'123456',
                                favorites:[],
                                history:[]
                            };
                            userList.push(tourist);
                            localStorage.setItem('web_users',JSON.stringify(userList));
                        }
                        localStorage.setItem('currentUser',JSON.stringify(tourist));
                        window.location.href = 'index.html';
                    },
                    // 注册逻辑
                    handleRegister(){
                        this.regErr = {user:'',pwd:'',rePwd:''};
                        let flag = true;
                        let uname = this.regForm.username.trim();
                        let upwd = this.regForm.pwd.trim();
                        let repwd = this.regForm.rePwd.trim();

                        // 用户名校验
                        if(uname.length <4 || uname.length>12){
                            this.regErr.user = '用户名4-12位字符';
                            flag = false;
                        }
                        // 密码长度
                        if(upwd.length <6){
                            this.regErr.pwd = '密码至少6位';
                            flag = false;
                        }
                        // 两次密码一致
                        if(upwd !== repwd){
                            this.regErr.rePwd = '两次输入密码不一致';
                            flag = false;
                        }
                        if(!flag) return;

                        // 判断用户名重复
                        let userList = JSON.parse(localStorage.getItem('web_users')) || [];
                        let exist = userList.find(u=>u.username === uname);
                        if(exist){
                            this.regErr.user = '用户名已被占用';
                            return;
                        }

                        // 新建用户（和个人中心数据结构统一）
                        let newUser = {
                            username: uname,
                            pwd: upwd,
                            favorites: [], // 收藏
                            history: []    // 浏览足迹
                        };
                        userList.push(newUser);
                        localStorage.setItem('web_users',JSON.stringify(userList));
                        alert('注册成功！请登录账号');
                        // 切回登录页，自动填充用户名
                        this.currentTab = 'login';
                        this.loginForm.username = uname;
                        this.regForm = {username:'',pwd:'',rePwd:''};
                    }
                }
            }).mount('#loginApp');
        })
    </script>
</body>
</html>
